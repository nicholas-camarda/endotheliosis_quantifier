# Conservative deploy run (no train/val/test leakage): 70% / 15% / 15% by source_sample_id groups.
# Stronger training defaults for MPS adapter: more epochs + cosine LR decay to eta_min.
#
# Run (outside sandbox if MPS required):
#   EQ_RUNTIME_ROOT=/path/to/runtime PYTORCH_ENABLE_MPS_FALLBACK=1 MPLCONFIGDIR=/tmp/mpl_eq \
#     /Users/ncamarda/mambaforge/envs/eq-mac/bin/python -m eq run-config \
#     --config configs/medsam_glomeruli_fine_tuning_deploy_conservative_mps.yaml

workflow: medsam_glomeruli_fine_tuning

run:
  name: deploy_conservative_mps_glomeruli
  runtime_root_env: EQ_RUNTIME_ROOT
  runtime_root_default: /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier
  python: /Users/ncamarda/mambaforge/envs/eq-mac/bin/python

inputs:
  manifest_path: raw_data/cohorts/manifest.csv
  train_fraction: 0.70
  validation_fraction: 0.15
  split_manifests:
    train: ""
    validation: ""
    test: ""
  lane_assignments: [manual_mask_core, manual_mask_external]
  split_grouping_key: source_sample_id

medsam:
  python: /Users/ncamarda/mambaforge/envs/medsam/bin/python
  inference_python: ""
  repo: /Users/ncamarda/Projects/MedSAM
  base_checkpoint: /Users/ncamarda/Projects/MedSAM/work_dir/MedSAM/medsam_vit_b.pth
  device: mps
  adaptation_mode: frozen_image_encoder_mask_decoder
  frozen_components: [image_encoder, prompt_encoder]
  trainable_components: [mask_decoder]

current_segmenter:
  comparison_threshold: 0.75
  transfer_model_path: /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier/models/segmentation/glomeruli/transfer/glomeruli_candidate_transfer-transfer_loss-custom_s1lr1e-3_s2lr_lrfind_e20_b12_lr1e-3_sz256/glomeruli_candidate_transfer-transfer_loss-custom_s1lr1e-3_s2lr_lrfind_e20_b12_lr1e-3_sz256.pkl
  scratch_model_path: /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier/models/segmentation/glomeruli/scratch/glomeruli_candidate_no_mito_base-scratch_e25_b12_lr1e-3_sz256/glomeruli_candidate_no_mito_base-scratch_e25_b12_lr1e-3_sz256.pkl

proposal:
  thresholds: [0.20, 0.35, 0.50]
  min_component_area: 2000
  max_component_area: 750000
  padding: 16
  merge_iou: 0.25
  max_boxes_per_image: 20

baseline_evaluation:
  external_baselines: false
  automatic_medsam: true
  oracle_prompt_medsam: true
  current_segmenter: true

tiling:
  tile_size: 512
  stride: 512
  expected_size: 256

training:
  backend: ""
  preprocessed_npy_root: derived_data/medsam_glomeruli/npy_data
  # Holdout validation split NPY (tight box prompts) for per-epoch val_loss / val_dice logs.
  val_preprocessed_npy_root: derived_data/medsam_glomeruli/npy_data_validation
  run_training: false
  epochs: 30
  batch_size: 2
  learning_rate: 0.0001
  weight_decay: 0.01
  bbox_shift: 20
  lr_scheduler: cosine
  min_lr: 0.000001
  image_size: 1024
  smoke_examples: 2
  smoke_epochs: 1
  smoke_batch_size: 1
  smoke_timeout_seconds: 300
  run_local_feasibility_smoke: false
  local_feasibility_required: true

adoption_gates:
  min_dice: 0.90
  min_jaccard: 0.82
  max_oracle_dice_gap: 0.05
  max_prompt_failures: 0

outputs:
  evaluation_dir: output/segmentation_evaluation/medsam_glomeruli_fine_tuning/deploy_conservative_mps_glomeruli
  checkpoint_id: deploy_conservative_mps_glomeruli
  checkpoint_root: models/medsam_glomeruli/deploy_conservative_mps_glomeruli
  mask_release_id: deploy_conservative_mps_glomeruli
  generated_mask_release_root: derived_data/generated_masks/glomeruli/medsam_finetuned/deploy_conservative_mps_glomeruli
  generated_mask_registry_path: derived_data/generated_masks/glomeruli/manifest.csv
  # Copy finetuned prediction masks into mask_release_root + central registry when eval completes.
  package_generated_mask_release: true
  create_checkpoint_dir_on_start: false
