# Runnable with:
#   eq run-config --config configs/glomeruli_candidate_comparison.yaml
#
# Purpose:
#   This is the glomeruli candidate-comparison run. It refreshes the cohort
#   manifest, trains or loads the mitochondria base needed for the transfer
#   candidate, trains the no-mitochondria-base comparator, and writes promotion
#   evidence for review.
#
# Do not manually stitch shell commands from this YAML. The command above is the
# supported entrypoint.

workflow: glomeruli_candidate_comparison

run:
  name: production_glomeruli_candidate_p0_contract_20260425
  seed: 42
  runtime_root_env: EQ_RUNTIME_ROOT
  runtime_root_default: /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier
  python: /Users/ncamarda/mambaforge/envs/eq-mac/bin/python
  required_env:
    PYTORCH_ENABLE_MPS_FALLBACK: "1"
    MPLCONFIGDIR: /tmp/mpl_eq
  training_device: mps
  notes:
    - Use the eq-mac environment on macOS.
    - Run real MPS training with PYTORCH_ENABLE_MPS_FALLBACK=1.
    - Glomeruli training uses every admitted manual-mask row in raw_data/cohorts.
    - P0 resize evidence supports the current 512-to-256 policy for this production candidate run.

paths:
  # Mitochondria training data. Must contain images/ and masks/.
  mito_data_dir: raw_data/mitochondria_data/training

  # Glomeruli training data. raw_data/cohorts is manifest-backed and includes
  # all admitted manual_mask_core plus manual_mask_external rows.
  glomeruli_data_dir: raw_data/cohorts

  # Model and comparison artifact roots, all resolved under EQ_RUNTIME_ROOT.
  mito_model_dir: models/segmentation/mitochondria
  glomeruli_model_dir: models/segmentation/glomeruli
  comparison_output_dir: output/segmentation_evaluation/glomeruli_candidate_comparison

  # Cohort registry surfaces refreshed at the start of the run.
  cohort_manifest: raw_data/cohorts/manifest.csv
  cohort_manifest_summary: derived_data/cohort_manifest/manifest_summary.json

mitochondria:
  enabled: true
  model_name: glomeruli_candidate_mito_base
  epochs: 25
  batch_size: 24
  learning_rate: 1e-3
  image_size: 256
  training_mode: dynamic_full_image_patching
  encoder_initialization: imagenet_pretrained_resnet34
  training_scope_decision: heldout_test_preserved
  inference_claim_status: heldout_evaluable
  decision_evidence: "The current workflow trains on raw_data/mitochondria_data/training only. The physical testing root is preserved for explicit evaluation and is not used for representation pretraining unless this config is intentionally changed."
  resize_policy_decision: current_policy_kept_for_production_candidate
  resize_decision_evidence: "256x256 remains the current mitochondria base input policy for this production candidate run. P0 focused on the glomeruli resize gate; mitochondria resize remains reproducibility provenance, not a promoted inference claim."

glomeruli_transfer:
  enabled: true
  model_name: glomeruli_candidate_transfer

  # Exact supported mitochondria artifact consumed by the transfer candidate.
  # Regenerate this path explicitly before running a supported comparison.
  base_model_artifact_path: models/segmentation/mitochondria/glomeruli_candidate_mito_base-pretrain_e25_b24_lr1e-3_sz256/glomeruli_candidate_mito_base-pretrain_e25_b24_lr1e-3_sz256.pkl

  epochs: 20
  training_mode: dynamic_full_image_patching
  candidate_family: mitochondria_transfer

glomeruli_scratch:
  enabled: true
  model_name: glomeruli_candidate_no_mito_base
  epochs: 25
  training_mode: dynamic_full_image_patching

  # This is the comparator without a mitochondria/base artifact. It still uses
  # the code's current ImageNet-pretrained ResNet34 encoder unless the training
  # implementation is explicitly changed to pretrained=False.
  candidate_family: no_mitochondria_base
  encoder_initialization: imagenet_pretrained_resnet34

candidate_training:
  # Shared glomeruli candidate training settings passed to
  # compare_glomeruli_candidates. The comparison CLI currently uses one shared
  # batch/LR/image/crop setting for both transfer and no-base candidates.
  batch_size: 12
  learning_rate: 1e-3
  image_size: 256
  crop_size: 512
  loss: bce_dice
  resize_policy_decision: current_policy_cleared_for_next_production_candidate
  resize_decision_evidence: "P0 controlled resize screening kept crop_size=512 and image_size=256. The 512-to-512 comparator improved some foreground metrics but failed transfer background category gates, so no-downsample is not selected for this production candidate run."

negative_background_supervision:
  # This is the foreground false-positive control added after the P3 quick run.
  # Mask-derived background crops come from admitted paired image/mask rows and
  # are accepted only when the source mask proves zero foreground in the crop.
  enabled: true
  mask_derived_background:
    enabled: true
    curation_id: production_glomeruli_candidate_p0_contract_20260425_mask_background
    crops_per_image_limit: 2
    sampler_weight: 0.5
    min_foreground_pixels: 0

  # Unmasked MR/TIFF crop proposals must be reviewed before they are trainable.
  # Set enabled=true only with a validated reviewed manifest.
  curated_negative_manifest:
    enabled: false
    manifest_path: null
    sampler_weight: 0.5

augmentation_audit:
  # The code currently applies FastAI aug_transforms in the DataBlock. This field
  # records the intended audit variant and fails closed for unsupported names; it
  # does not mean gaussian noise is active.
  variant: fastai_default

comparison:
  enabled: true

  # true means compare_glomeruli_candidates trains transfer and no-base
  # candidates if explicit candidate paths are not supplied.
  train_candidates: true

  # Review-panel sampling only. The comparison code groups validation masks by
  # deterministic foreground/structure categories and includes up to this many
  # examples from each category. This does not change the training set size.
  examples_per_category: 10

  # Practical equivalence margin used by the promotion decision logic. A small
  # difference inside this margin should not be treated as a clear win.
  tie_margin: 0.02

evidence:
  # These filenames are relative to paths.comparison_output_dir. Keeping them
  # relative avoids repeating the same output root in multiple places.
  files:
    - candidate_summary.csv
    - candidate_predictions.csv
    - promotion_report.json
    - promotion_report.md
    - promotion_report.html
