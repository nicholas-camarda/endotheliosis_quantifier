# Runnable with:
#   eq run-config --config configs/glomeruli_finetuning_config.yaml
#
# Purpose:
#   Train one glomeruli transfer candidate from an existing mitochondria base
#   artifact. This is not the full overnight comparator. Use
#   segmentation_fixedloader_full_retrain.yaml when you want to train the mito
#   base and then compare transfer versus no-mitochondria-base candidates.
#
# Required precondition:
#   A mitochondria .pkl matching pretrained_model.artifact_glob must already
#   exist under EQ_RUNTIME_ROOT. If it does not exist, the runner fails instead
#   of silently doing scratch/no-base training.

workflow: segmentation_glomeruli_transfer

run:
  name: glomeruli_transfer_all_admitted_eqmac
  seed: 84
  runtime_root_env: EQ_RUNTIME_ROOT
  runtime_root_default: /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier
  python: /Users/ncamarda/mambaforge/envs/eq-mac/bin/python
  required_env:
    PYTORCH_ENABLE_MPS_FALLBACK: "1"
    MPLCONFIGDIR: /tmp/mpl_eq

name: "glomeruli_finetuning"
description: "Train one glomeruli transfer candidate from a mitochondria base model"

pretrained_model:
  # The runner selects the latest matching .pkl and passes it as --base-model.
  # This is intentionally explicit: transfer must load a real supported base
  # artifact or fail before training.
  artifact_glob: "models/segmentation/mitochondria/mito_dynamic_unet_seg_model-pretrain_e50_b24_lr1e-3_sz256/*.pkl"
  description: "Mitochondria-pretrained U-Net model"
  freeze_encoder: false

data:
  # Lauren-only raw paths are retained as provenance/reference surfaces.
  # The actual training root for this config is processed.train_dir.
  raw_images: "raw_data/cohorts/lauren_preeclampsia"
  raw_annotations: "raw_data/cohorts/lauren_preeclampsia/scores/labelstudio_annotations.json"
  raw_metadata: "raw_data/cohorts/lauren_preeclampsia/metadata/subject_metadata.xlsx"

  # Generated metadata location. This is not the image/mask training root.
  metadata: "derived_data/glomeruli_training/metadata/standardized_metadata.xlsx"

  annotations:
    json_file: "raw_data/cohorts/lauren_preeclampsia/scores/labelstudio_annotations.json"
    processor: "recover_labelstudio_scores"

  processed:
    # This is the root passed to eq.training.train_glomeruli.
    # raw_data/cohorts means all admitted manual_mask_core and
    # manual_mask_external rows in the manifest are eligible for training.
    train_dir: "raw_data/cohorts"

    # These Lauren-only subpaths document the direct paired cohort layout.
    # They are not used to restrict the all-data manifest-backed training root.
    train_image_dir: "raw_data/cohorts/lauren_preeclampsia/images"
    train_mask_dir: "raw_data/cohorts/lauren_preeclampsia/masks"

    cache_dir: "derived_data/segmentation_cache/glomeruli"
    training_mode: "dynamic_full_image_patching"
    crop_size: 512

  preprocessing:
    convert_tif_to_jpg: true
    resize_to: [256, 256]
    normalize: true

  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    random_seed: 84
    stratify: true

model:
  architecture: "dynamic_unet"
  backbone: "resnet34"
  input_size: [256, 256]
  num_classes: 2

  training:
    # Mac/MPS starting point for glomeruli 512 -> 256 dynamic patching.
    epochs: 30
    batch_size: 12
    learning_rate: 1e-3
    weight_decay: 1e-4
    scheduler: "cosine_annealing"
    early_stopping:
      patience: 10
      monitor: "val_dice"

  output_dir: "models/segmentation/glomeruli"
  model_name: "glom_dynamic_unet_seg_model"
  checkpoint_path: "models/segmentation/glomeruli/glom_dynamic_unet_seg_model.pkl"

label_studio:
  export_format: "JSON"
  annotation_types:
    - "rle"
    - "choices"
  rle_processing:
    decode_function: "decode_label_studio_rle"
    mask_resize: [256, 256]

augmentation:
  enabled: true
  techniques:
    - "horizontal_flip"
    - "vertical_flip"
    - "rotation"
    - "brightness_contrast"
    - "gaussian_noise"
  probability: 0.5

hardware:
  device: "auto"
  mixed_precision: true
  num_workers: 4
  mps_fallback: true
  force_cpu: false

reproducibility:
  random_seed: 84
  deterministic: true

logging:
  level: "INFO"
  save_plots: true
  plot_dir: "models/segmentation/glomeruli/transfer/<run_id>"
  metrics:
    - "dice_coefficient"
    - "iou"
    - "pixel_accuracy"

evaluation:
  metrics:
    - "dice_coefficient"
    - "jaccard_index"
    - "sensitivity"
    - "specificity"
  save_predictions: true
  prediction_dir: "output/predictions/glomeruli/<model_run_id>/<input_set>"

final_model:
  description: "Glomeruli segmentation transfer candidate"
  use_case: "Segment glomeruli in histology images for downstream endotheliosis quantification"
  next_step: "Run candidate comparison/promotion gates before using as the segmentation model for quantification."
