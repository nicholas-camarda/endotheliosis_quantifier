name: eq
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  # WSL/CUDA primary runtime
  - python=3.10
  - pip

  # Core scientific computing
  - numpy=1.24.3
  - scipy=1.10.1
  - scikit-learn=1.3.0
  - matplotlib=3.7.2
  - pandas=2.0.3
  - pyyaml=6.0.2

  # Image processing
  - pillow=9.5.0
  - opencv=4.8.0
  - tifffile=2023.7.10

  # ML libraries
  - lightgbm=4.0.0
  - xgboost=1.7.6

  # Development tools
  - ipykernel
  - jupyter
  - mypy=1.17.1
  - pytest=8.4.1
  - ruff=0.12.9
  - setuptools<81

  # PyTorch stack with CUDA 12.1
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=12.1

  # Project-specific pip packages
  - pip:
      - alive-progress==3.3.0
      - fastai==2.7.13
      - albumentations==1.3.1
      - scikit-optimize==0.9.0
      - openpyxl==3.1.5
