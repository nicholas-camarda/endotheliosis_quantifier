schema: spec-driven

context: |
  Endotheliosis Quantifier is a Python package under src/eq with the eq CLI as the supported interface.
  Local development is WSL/CUDA-first. This checkout must not expose repo-root raw_data, derived_data, models, logs, output, data, archive, backups, cache, or test_output directories or symlinks; heavy artifacts belong under /Users/ncamarda/ProjectsRuntime/endotheliosis_quantifier or the configured runtime root.
  On macOS, project execution, segmentation training, segmentation validation, model export, and model loading use the eq-mac conda environment. Activate eq-mac before running project Python commands.
  Real Mac MPS commands must run unsandboxed when Metal access matters. If Codex sandbox MPS behavior fails or disagrees with expected local behavior, rerun the same substantive command outside the sandbox with eq-mac before drawing conclusions.
  Mac segmentation training and validation commands should use PYTORCH_ENABLE_MPS_FALLBACK=1 when PyTorch requires CPU fallback for unsupported MPS operations, but requested transfer training must still fail closed if the base artifact cannot load or contributes zero compatible weights. The current glomeruli scratch candidate is the no-mitochondria-base comparator with an ImageNet-pretrained ResNet34 encoder, not a literal all-random initialization baseline.
  Git-tracked code and configs must stay separate from raw data, derived data, trained models, logs, and generated quantification outputs.
  Path defaults and environment overrides are centralized in src/eq/utils/paths.py.
  Reuse and centralization are repository-wide design constraints. Before adding a new function, helper, script, CLI path, config key, output schema, gate, or validation step, inspect the existing owner and extend or reuse it when the concept already exists. Prefer one canonical implementation per concept under the appropriate src/eq module, and treat duplicated workflow-local gates or near-identical scripts as design debt unless explicitly justified.
  Runtime cohort identity and workflow lane are separate: Lauren's preeclampsia data is cohort_id=lauren_preeclampsia with lane_assignment=manual_mask_core; Dox manual masks use cohort_id=vegfri_dox with lane_assignment=manual_mask_external. Do not use generic cohort names to encode mask state.
  Quantification uses Label Studio image-level grades joined to image/mask pairs with full multi-component union ROI semantics.
  Method changes must distinguish segmentation behavior, embedding/ordinal prediction behavior, and scientific interpretation.
  Supported segmentation model artifacts must be current-namespace exports that load in the current certified environment without legacy pickle namespace shims.
  Legacy FastAI pickle artifacts that reference removed project modules, old FastAI transform namespaces, or incompatible NumPy pickle namespaces are historical artifacts unless a separate compatibility change explicitly supports them.
  Model artifact provenance must identify the training command, code version, package versions, data root, and training mode before an artifact is used as a supported runtime dependency.
  MPS execution, model pickle loading, and contract-first pipeline completion are compatibility evidence only; they do not by themselves promote a segmentation model for scientific use.
  Promoted glomeruli segmentation artifacts require a current-namespace model, training-data background/negative coverage, validation metrics, and non-degenerate prediction review evidence.
  Real eq-mac MPS validation should be treated as an unsandboxed macOS-terminal task when Metal access matters, because Codex sandbox behavior is not authoritative for actual MPS execution.

rules:
  proposal:
    - Identify affected src/eq modules, CLI commands, configs, tests, and artifact directories.
    - Identify existing functions, modules, scripts, configs, gates, and output contracts checked for reuse before proposing new implementation surfaces.
    - Call out changes to data contracts, path resolution, storage boundaries, or generated output schemas.
    - Distinguish legacy model artifacts, compatibility artifacts, supported runtime artifacts, and scientifically promoted artifacts.
    - Separate descriptive, associational, causal, and predictive/prognostic claims.
    - State compatibility risks for existing local data, model files, and quantification outputs.
    - Prefer exact workflow IDs, module paths, function names, config filenames, CLI commands, and output roots whenever they can be decided at proposal time.
    - Include a `## Explicit Decisions` section whenever concrete names or paths have been fixed.
    - If unresolved questions remain, include a `## Open Questions` section and tag every question as `[resolve_before_apply]`, `[audit_first_then_decide]`, or `[defer_ok]`.
    - Do not hide undecided implementation surfaces behind vague placeholders such as `new workflow runner`, `new config`, `or its replacement`, or `where needed`; record that uncertainty as a tagged open question instead.
  specs:
    - Use current repository terminology for segmentation, Label Studio scores, union ROIs, embeddings, and ordinal outputs.
    - Describe observable behavior in concrete repo, runtime-output, and published-artifact terms.
    - Mark missing data, unverified assumptions, and external-validity limits explicitly.
  design:
    - Reuse existing path helpers, CLI loaders, data-contract utilities, and quantification modules before adding abstractions.
    - Centralize shared behavior in its existing owner where possible; if a new helper, module, script, CLI command, config key, gate, or schema is required, explain why the existing owner cannot absorb it.
    - Do not create parallel workflow-local gates, duplicate path systems, near-identical scripts, or copied validation logic for concepts that already exist elsewhere in the repo.
    - Describe data flow and artifact flow across raw data, derived data, models, logs, and output.
    - Do not make tests depend on legacy FastAI pickle artifacts unless the change is explicitly about legacy artifact compatibility.
    - Include failure modes that could silently change labels, masks, ROI geometry, embeddings, metrics, or review artifacts.
    - Treat positive-only patch sampling, all-foreground/all-background masks, flat validation curves, and degenerate prediction grids as model-promotion blockers.
    - Prefer exact workflow IDs, module paths, function names, config filenames, CLI commands, and output roots whenever they can be decided at design time.
    - Use a `## Explicit Decisions` section instead of leaving key naming or ownership choices implicit.
    - If unresolved questions remain, include a `## Open Questions` section and tag every question as `[resolve_before_apply]`, `[audit_first_then_decide]`, or `[defer_ok]`.
    - Questions tagged `[audit_first_then_decide]` must identify the audit target, evidence source, or inspection step that will determine the answer.
  tasks:
    - Break work into small reviewable steps with implementation, tests, and docs/config updates when behavior changes.
    - Include explicit reuse/centralization tasks for any new shared contract, and include migration tasks for touched callers instead of leaving duplicated local logic behind.
    - Include validation commands covering imports, relevant CLI paths, unit tests, and any changed OpenSpec artifacts.
    - When a repository-local explicitness checker exists, include it in the final validation task for changes that add or materially revise proposal/design artifacts.
